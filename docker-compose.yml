services:
  postgres:
    image: postgres:16-alpine
    container_name: dashboard-cronico-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dashboard_cronico
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dashboard_cronico_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dashboard_cronico"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dashboard_cronico_postgres_data:
